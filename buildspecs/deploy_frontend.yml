version: 0.2

env:
  variables:
    NPM_CONFIG_PRODUCTION: "false"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies for CDK..."
      - cd infra && npm install && npm run build && cd ..
  build:
    commands:
      - echo "Deploying frontend to environment:$ENVIRONMENT"
      - echo "Copying build artifacts to dist/..."
      - cp -r $CODEBUILD_SRC_DIR_FrontendBuildOutput/* dist/ || mkdir -p dist && cp -r $CODEBUILD_SRC_DIR_FrontendBuildOutput/* dist/
      - ls -la dist/
      - echo "Deploying CDK stack..."
      - cd infra
      - npx cdk deploy FuwariFrontend-$ENVIRONMENT --context environment=$ENVIRONMENT --context withAssets=false --require-approval never --progress events
      - echo "Getting stack outputs..."
      - BUCKET=$(aws cloudformation describe-stacks --stack-name FuwariFrontend-$ENVIRONMENT --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text)
      - DIST_ID=$(aws cloudformation describe-stacks --stack-name FuwariFrontend-$ENVIRONMENT --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' --output text)
      - WEBSITE_URL=$(aws cloudformation describe-stacks --stack-name FuwariFrontend-$ENVIRONMENT --query 'Stacks[0].Outputs[?OutputKey==`WebsiteURL`].OutputValue' --output text)
      - echo "Syncing files to S3 bucket:$BUCKET"
      - cd ..
      - aws s3 sync dist/ s3://$BUCKET/ --delete
      - echo "Creating CloudFront invalidation for distribution:$DIST_ID"
      - aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
      - echo "Frontend deployed successfully!"
      - echo "Website URL:$WEBSITE_URL"
  post_build:
    commands:
      - echo "Deployment completed for environment:$ENVIRONMENT"

artifacts:
  files:
    - "infra/cdk.out/**/*"
  name: FrontendDeployOutput

cache:
  paths:
    - "infra/node_modules/**/*"
