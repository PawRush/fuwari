version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm install -g pnpm
      - pnpm install --frozen-lockfile

  build:
    commands:
      - echo "Running unit tests..."
      - pnpm test 2>&1 || echo "No tests configured"

artifacts:
  files:
    - '**/*'
  name: UnitTestsOutput
